# Details about the install.yaml file are at https://ddev.readthedocs.io/en/stable/users/extend/additional-services/#sections-and-features-of-ddev-get-add-on-installyaml
name: ddev-websocket
project_files:
  - web-build/Dockerfile
  - web-build/SocketServer.js
  - config.websocket.yml
  - js/SocketClient.js
  - js/plugins/client/ping/index.js
  - js/plugins/client/plugins.js
  - js/plugins/client/index.js
  - js/plugins/server/index.js
  - js/plugins/server/pong/index.js
  - nginx/ddev-websocket.conf
  - websocket_patch.sh
ddev_version_constraint: '>= v1.24.3'
